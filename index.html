<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0" />
<title>KIP Animated Background</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: #000;
}

.scene {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background-image: url("kip-bg.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* ușor efect de profunzime peste poză */
.scene::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 83%, rgba(255, 0, 150, 0.10), transparent 28%),
    radial-gradient(circle at 30% 80%, rgba(0, 140, 255, 0.12), transparent 26%),
    linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.18));
  pointer-events: none;
  z-index: 2;
}

/* ploaie fină */
.rain {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(180deg, rgba(120, 210, 255, 0.28), transparent);
  background-size: 2px 58px;
  opacity: 0.10;
  transform: skewX(-12deg);
  animation: rainMove 0.75s infinite linear;
  z-index: 4;
}

@keyframes rainMove {
  from { background-position: 0 0; }
  to { background-position: 0 58px; }
}

/* avarii mașină centrală */
.car-tail-left,
.car-tail-right {
  position: absolute;
  top: 1598px;
  width: 112px;
  height: 28px;
  border-radius: 18px;
  background: rgba(255, 25, 65, 0.85);
  box-shadow:
    0 0 18px rgba(255, 25, 65, 0.9),
    0 0 42px rgba(255, 25, 65, 0.55);
  animation: hazard 1.05s infinite ease-in-out;
  z-index: 6;
}

.car-tail-left {
  left: 336px;
}

.car-tail-right {
  right: 335px;
}

@keyframes hazard {
  0%, 42% {
    opacity: 0.35;
    filter: blur(0.2px);
    box-shadow:
      0 0 8px rgba(255, 25, 65, 0.45),
      0 0 18px rgba(255, 25, 65, 0.30);
  }
  50%, 100% {
    opacity: 1;
    filter: blur(0);
    box-shadow:
      0 0 22px rgba(255, 25, 65, 1),
      0 0 58px rgba(255, 25, 65, 0.75),
      0 0 95px rgba(255, 0, 100, 0.40);
  }
}

/* glow pe asfalt de la stopuri */
.red-road-glow {
  position: absolute;
  left: 205px;
  bottom: 0;
  width: 670px;
  height: 360px;
  background:
    radial-gradient(circle at 35% 38%, rgba(255, 0, 75, 0.36), transparent 36%),
    radial-gradient(circle at 65% 38%, rgba(255, 0, 75, 0.30), transparent 38%);
  filter: blur(22px);
  opacity: 0.58;
  animation: roadGlow 1.05s infinite ease-in-out;
  z-index: 3;
}

@keyframes roadGlow {
  0%, 42% { opacity: 0.28; }
  50%, 100% { opacity: 0.70; }
}

/* sirenă poliție stânga */
.police-blue,
.police-red {
  position: absolute;
  top: 1498px;
  width: 135px;
  height: 42px;
  border-radius: 50%;
  filter: blur(16px);
  z-index: 5;
}

.police-blue {
  left: 112px;
  background: rgba(0, 100, 255, 0.85);
  animation: policeBlue 1.15s infinite alternate ease-in-out;
}

.police-red {
  left: 230px;
  background: rgba(255, 0, 70, 0.78);
  animation: policeRed 1.15s infinite alternate ease-in-out;
}

@keyframes policeBlue {
  from { opacity: 0.25; transform: scale(0.92); }
  to { opacity: 0.85; transform: scale(1.08); }
}

@keyframes policeRed {
  from { opacity: 0.85; transform: scale(1.08); }
  to { opacity: 0.25; transform: scale(0.92); }
}

/* fum de la roți */
.smoke {
  position: absolute;
  bottom: 70px;
  width: 420px;
  height: 210px;
  border-radius: 50%;
  filter: blur(30px);
  opacity: 0.62;
  z-index: 7;
  animation: smokeMove 5.5s infinite alternate ease-in-out;
}

.smoke-left {
  left: 210px;
  background:
    radial-gradient(circle at 35% 50%, rgba(255, 0, 130, 0.32), transparent 42%),
    radial-gradient(circle at 60% 55%, rgba(255, 255, 255, 0.16), transparent 45%);
}

.smoke-right {
  right: 165px;
  background:
    radial-gradient(circle at 45% 50%, rgba(0, 160, 255, 0.34), transparent 42%),
    radial-gradient(circle at 60% 55%, rgba(255, 255, 255, 0.14), transparent 45%);
  animation-delay: 1.2s;
}

@keyframes smokeMove {
  from {
    transform: translateX(-35px) translateY(10px) scale(0.95);
    opacity: 0.42;
  }
  to {
    transform: translateX(45px) translateY(-18px) scale(1.16);
    opacity: 0.76;
  }
}

/* particule neon jos */
.particle {
  position: absolute;
  bottom: 0;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #00eaff;
  box-shadow: 0 0 12px #00eaff;
  opacity: 0;
  z-index: 8;
  animation: particleUp 4.5s infinite linear;
}

.p1 { left: 140px; animation-delay: 0s; background: #00eaff; }
.p2 { left: 255px; animation-delay: .7s; background: #ff2bd6; box-shadow: 0 0 12px #ff2bd6; }
.p3 { left: 390px; animation-delay: 1.3s; background: #00eaff; }
.p4 { left: 545px; animation-delay: 2s; background: #ff2bd6; box-shadow: 0 0 12px #ff2bd6; }
.p5 { left: 690px; animation-delay: 2.8s; background: #00eaff; }
.p6 { left: 830px; animation-delay: 3.4s; background: #ff2bd6; box-shadow: 0 0 12px #ff2bd6; }
.p7 { left: 950px; animation-delay: 4s; background: #00eaff; }

@keyframes particleUp {
  0% {
    transform: translateY(0) scale(0.5);
    opacity: 0;
  }
  18% {
    opacity: 0.9;
  }
  100% {
    transform: translateY(-520px) scale(1.4);
    opacity: 0;
  }
}

/* lumină fină peste numărul KIP */
.plate-glow {
  position: absolute;
  left: 476px;
  top: 1638px;
  width: 128px;
  height: 46px;
  border-radius: 8px;
  background: rgba(160, 210, 255, 0.12);
  box-shadow:
    0 0 18px rgba(150, 210, 255, 0.45),
    inset 0 0 12px rgba(255,255,255,0.14);
  animation: platePulse 2.2s infinite alternate ease-in-out;
  z-index: 6;
}

@keyframes platePulse {
  from { opacity: 0.28; }
  to { opacity: 0.70; }
}
</style>
</head>

<body>
  <div class="scene">
    <div class="rain"></div>

    <div class="red-road-glow"></div>

    <div class="police-blue"></div>
    <div class="police-red"></div>

    <div class="car-tail-left"></div>
    <div class="car-tail-right"></div>

    <div class="plate-glow"></div>

    <div class="smoke smoke-left"></div>
    <div class="smoke smoke-right"></div>

    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>
    <div class="particle p7"></div>
  </div>
</body>
</html>
